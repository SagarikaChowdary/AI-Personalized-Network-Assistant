<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Networking Assistant Login</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}


body{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(
135deg,
#fce7f3,
#ede9fe,
#e0f2fe
);

}



.login-box{

width:430px;

background:white;

padding:45px;

border-radius:30px;

box-shadow:
0 15px 35px rgba(0,0,0,.12);

text-align:center;

}



.login-box h1{

color:#6d28d9;

margin-bottom:10px;

font-size:32px;

}



.login-box p{

color:#666;

margin-bottom:25px;

}



input{

width:100%;

padding:15px;

margin:10px 0;

border:none;

outline:none;

border-radius:15px;

background:#f8fafc;

box-shadow:
0 5px 15px rgba(0,0,0,.08);

font-size:16px;

}



.login-btn{

width:100%;

padding:15px;

margin-top:10px;

border:none;

border-radius:15px;

cursor:pointer;

font-size:17px;

color:white;


background:
linear-gradient(
90deg,
#a78bfa,
#60a5fa
);

}



.login-btn:hover{

transform:translateY(-2px);

}



.switch{

margin-top:25px;

font-size:15px;

color:#666;

}



.switch a{

color:#6d28d9;

font-weight:bold;

cursor:pointer;

}



#name,
#confirmPassword{

display:none;

}


</style>


</head>



<body>



<div class="login-box">


<h1>
🤝 Networking Assistant
</h1>


<p id="title">
Sign In to continue
</p>




<input

id="name"

type="text"

placeholder="Full Name"

>




<input

id="email"

type="email"

placeholder="Email Address"

>



<input

id="password"

type="password"

placeholder="Password"

>




<input

id="confirmPassword"

type="password"

placeholder="Confirm Password"

>




<button

class="login-btn"

onclick="handleAuth()"

id="submitBtn">

Sign In

</button>




<div class="switch">


<span id="switchText">
New user?
</span>


<a

id="switchLink"

onclick="showSignup()">

Create Account

</a>


</div>


</div>






<script type="module">



import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";



import {

getAuth,

createUserWithEmailAndPassword,

signInWithEmailAndPassword,

updateProfile

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";






// FIREBASE CONFIG


const firebaseConfig = {


apiKey:
"AIzaSyAIddgZEOS6FcbHEyrd1ZsIohP9RRrggTo",


authDomain:
"networking-assistant-db80f.firebaseapp.com",


projectId:
"networking-assistant-db80f",


storageBucket:
"networking-assistant-db80f.firebasestorage.app",


messagingSenderId:
"295350307649",


appId:
"1:295350307649:web:accf27779695696817efc0",


measurementId:
"G-7TRPPSBF9K"


};





const app =
initializeApp(firebaseConfig);



const auth =
getAuth(app);




let signupMode=false;






// SWITCH TO SIGNUP


window.showSignup=function(){


signupMode=true;


document.getElementById("title").innerHTML=
"Create Your Account";


document.getElementById("submitBtn").innerHTML=
"Sign Up";



document.getElementById("name").style.display=
"block";


document.getElementById("confirmPassword").style.display=
"block";



document.getElementById("switchText").innerHTML=
"Already have an account?";



document.getElementById("switchLink").innerHTML=
"Sign In";


document.getElementById("switchLink").onclick=
showLogin;


}






// SWITCH TO LOGIN


window.showLogin=function(){


signupMode=false;



document.getElementById("title").innerHTML=
"Sign In to continue";



document.getElementById("submitBtn").innerHTML=
"Sign In";



document.getElementById("name").style.display=
"none";


document.getElementById("confirmPassword").style.display=
"none";



document.getElementById("switchText").innerHTML=
"New user?";


document.getElementById("switchLink").innerHTML=
"Create Account";


document.getElementById("switchLink").onclick=
showSignup;


}









// LOGIN / SIGNUP FUNCTION


window.handleAuth=async function(){



let name =
document.getElementById("name").value.trim();



let email =
document.getElementById("email").value.trim();



let password =
document.getElementById("password").value;



let confirmPassword =
document.getElementById("confirmPassword").value;






if(email=="" || password==""){

alert("Please enter email and password");

return;

}






if(signupMode){



if(name==""){

alert("Enter your name");

return;

}



if(password!==confirmPassword){

alert("Passwords do not match");

return;

}




try{


const userCredential =

await createUserWithEmailAndPassword(

auth,

email,

password

);




await updateProfile(

userCredential.user,

{

displayName:name

}

);




localStorage.setItem(
"userName",
name
);


localStorage.setItem(
"userEmail",
email
);




alert("Account created successfully");



window.location.href="index.html";



}

catch(error){


alert(error.message);


}





}

else{



try{


const userCredential =

await signInWithEmailAndPassword(

auth,

email,

password

);



localStorage.setItem(

"userName",

userCredential.user.displayName || "User"

);



localStorage.setItem(

"userEmail",

userCredential.user.email

);




alert("Login successful");



window.location.href="index.html";



}


catch(error){


alert(error.message);


}



}




}





</script>



</body>

</html>
